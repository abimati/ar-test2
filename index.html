<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maezen Digital | v.10</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.9); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .arjs-loader div { 
            text-align: center; color: white; font-size: 1.4em; 
            font-family: 'Segoe UI', sans-serif; font-weight: bold;
        }
        .version-tag { font-size: 0.6em; opacity: 0.5; margin-top: 10px; display: block; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <div class="arjs-loader">
        <div>
            Maezen Digital
            <span class="version-tag">v.10 loading experience...</span>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true; precision: medium;"
        embedded
        arjs="trackingMethod: nft; sourceType: webcam; debugUIEnabled: false;">

        <a-nft
            type="nft"
            url="./targets/card 4"
            smooth="true"
            smoothCount="10"
            smoothTolerance=".01"
            smoothThreshold="5">
            
            <a-entity
                gltf-model="./model.glb"
                scale="50 50 50"
                position="50 150 0"
                rotation="-90 0 0">
            </a-entity>

        </a-nft>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
