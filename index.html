<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Maezen Digital | AR Invitation</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/encantar-js@latest/dist/encantar.min.js"></script>

    <style>
        :root { --brand-purple: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* Premium Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .brand {
            font-size: 3rem; font-weight: 800;
            background: var(--brand-purple);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            animation: reveal 1.2s ease-out forwards;
        }
        @keyframes reveal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern UI Prompt */
        #ar-prompt {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 999; display: none;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
            padding: 15px 35px; color: white; text-align: center;
        }
    </style>
</head>

<body>
    <div id="splash"><div class="brand">Maezen Digital</div></div>

    <div id="ar-prompt">
        <p style="margin:0; font-weight: 500;">እባክዎን ካርዱን ስካን ያድርጉ</p>
        <span style="font-size: 0.7rem; opacity: 0.6;">POINT CAMERA AT CARD 4</span>
    </div>

    <a-scene 
        encantar="targetUrl: ./targets/card 4; debug: false;"
        renderer="antialias: true; colorManagement: true; powerPreference: high-performance;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="myModel" src="./model.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.6"></a-light>

        <a-entity encantar-target="id: 0">
            <a-gltf-model 
                src="#myModel" 
                scale="0.5 0.5 0.5" 
                position="0 0 0" 
                rotation="0 0 0">
            </a-gltf-model>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const splash = document.getElementById('splash');
        const prompt = document.getElementById('ar-prompt');
        const scene = document.querySelector('a-scene');

        // Splash Sequence
        window.addEventListener('load', () => {
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => { 
                    splash.style.display = 'none';
                    prompt.style.display = 'block';
                }, 1000);
            }, 1500);
        });

        // Tracking Events (Native Snappiness)
        scene.addEventListener('targetFound', () => {
            prompt.style.display = 'none';
            if ("vibrate" in navigator) navigator.vibrate(60);
        });

        scene.addEventListener('targetLost', () => {
            prompt.style.display = 'block';
        });
    </script>
</body>
</html>
