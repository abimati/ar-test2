<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Maezen Digital | Camera Fix</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/encantar-js@0.4.6/dist/encantar.min.js"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        #camera-error {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; /* Only shows if error occurs */
            justify-content: center; align-items: center; text-align: center; z-index: 9999;
        }
        .btn { background: #a855f7; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>

<body>
    <div id="camera-error">
        <div>
            <h2>ካሜራው አልተከፈተም</h2>
            <p>Camera not opening. Please ensure you are using HTTPS and granted permissions.</p>
            <button class="btn" onclick="location.reload()">RELOAD PAGE</button>
        </div>
    </div>

    <a-scene 
        encantar="targetUrl: ./targets/card 4; debug: false;"
        renderer="antialias: true; powerPreference: high-performance;"
        vr-mode-ui="enabled: false">

        <a-assets>
            <a-asset-item id="myModel" src="./model.glb"></a-asset-item>
        </a-assets>

        <a-entity encantar-target="id: 0">
            <a-gltf-model src="#myModel" scale="0.5 0.5 0.5"></a-gltf-model>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // FORCED CAMERA CHECK
        async function checkCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                console.log("Camera access granted");
                // Stop the stream immediately, Encantar will take over
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.error("Camera Error:", err);
                document.getElementById('camera-error').style.display = 'flex';
            }
        }

        // Run check on load
        window.addEventListener('load', checkCamera);

        // Debug: Log if Encantar fails to start
        document.querySelector('a-scene').addEventListener('loaded', () => {
            console.log("AR Scene Loaded");
        });
    </script>
</body>
</html>
