<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/encantar-js@0.4.6/dist/encantar.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene encantar="targetUrl: ./targets/card 4;">
      
      <a-assets>
        <a-asset-item id="myModel" src="model.glb"></a-asset-item>
      </a-assets>

      <a-entity encantar-target="id: 0">
        <a-gltf-model src="#myModel" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>

      <a-entity camera></a-entity>

    </a-scene>

  </body>
</html>
